<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    width: 1024px;
    height: 1024px;
    background: transparent;
  }
  .squircle {
    position: absolute;
    inset: 100px;
    width: 824px;
    height: 824px;
    border-radius: 186px;
    background: linear-gradient(165deg, #1c1917 0%, #0c0a09 70%);
    box-shadow: inset 0 4px 18px rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label {
    font-family: "Iowan Old Style", "Palatino", Georgia, serif;
    font-weight: 700;
    font-size: 300px;
    letter-spacing: -0.02em;
    color: #f6f4ee;
    line-height: 1;
    transform: translateY(-12px);
  }
  .label .dot {
    color: #bc4b27;
  }
  .bar {
    position: absolute;
    left: 50%;
    bottom: 172px;
    transform: translateX(-50%);
    width: 300px;
    height: 22px;
    border-radius: 11px;
    background: #bc4b27;
  }
</style>
</head>
<body>
  <div class="squircle">
    <div class="label"><span class="dot">.</span>MD</div>
    <div class="bar"></div>
  </div>
</body>
</html>
